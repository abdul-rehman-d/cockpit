name: Version and Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Create release PR and tags
        uses: googleapis/release-please-action@v4
        with:
          release-type: go
          package-name: cockpit
          target-branch: main
          include-v-in-tag: true
          skip-github-release: true
